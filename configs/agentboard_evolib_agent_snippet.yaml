# Merge this into AgentBoard/eval_configs/main_results_all_tasks.yaml after installing the plugin.
agent:
  name: EvoLibAgent
  memory_size: 100
  need_goal: True
  library:
    storage:
      path: ./results/evolib_agentboard_library.json
    retrieval:
      k_skills: 4
      k_insights: 4
      similarity_threshold: 0.05
      sampling_strategy: weighted
    composition:
      max_prompt_entries: 8
    ig:
      scorer: self_judge
    fig:
      parent_credit: enabled
    consolidation:
      similarity_merge_threshold: 0.88
    sampling:
      strategy: weighted
  action_hint: "Use one exact executable action accepted by the current AgentBoard environment."

# Then run AgentBoard normally, for example:
# python agentboard/eval_main.py \
#   --cfg-path eval_configs/main_results_all_tasks.yaml \
#   --tasks alfworld,webshop \
#   --model gpt-3.5-turbo-0613 \
#   --log_path ./results/evolib_agentboard
