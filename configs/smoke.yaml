seed: 0
output_dir: ./runs/smoke
llm:
  provider: heuristic
env:
  backend: mock
  kwargs:
    max_steps: 5
agent:
  memory_size: 8
  action_hint: "Use one of: look, pick apple, put apple in basket."
library:
  storage:
    path: ./runs/smoke/library.json
  retrieval:
    k_skills: 3
    k_insights: 3
    similarity_threshold: 0.0
    sampling_strategy: weighted
  composition:
    max_prompt_entries: 6
  ig:
    scorer: self_judge
  fig:
    parent_credit: enabled
  consolidation:
    similarity_merge_threshold: 0.86
  sampling:
    strategy: weighted
eval:
  split: test
  limit: 3
  max_steps: 5
  library_update_uses_env_reward: false
